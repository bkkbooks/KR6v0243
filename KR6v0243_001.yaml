body:
  text: 之一碑陰魏報德玉象七佛頌碑軌基綿邈體非緣待有无不染唯聖乃詳實證以故夢中說夢周蝶相轉或云始從見終於第一有思成佛法身无心於為而无不為任物成壞位極方具故知山谷之音可盡如夢所見非求可得一俯一仰木石開況至理之中何身不有同方其誰不是三界何家知非无在不在綸太虛信矣是以共世人歷劫猶不覺知況業差地別七識十居毒飯馬麥正其宜也明須結心王佇立門側時宿草菴始信是天屬諒非旦夕之間可得逢覲涓涓決石履堅冰大魏龍飛恒代創基帝業王有九土至高祖孝文定鼎崧洛莊飾宙津梁四海禮樂更新雅頌洋溢於是逆旅星宮林墅華殿廣興塔廟紹隆三寶始造報德寺洸洸濟濟與舍衛竹園同風宣武皇帝剖玉荊山賈重連城彫鏤瑩飾模一佛兩菩薩石基磚宮樹於寺庭法鼓於是始聞世間中止之輪再轉於大千半月之儀流暉於東夏寔淪影餘光亦髣髴初旭沙門曇昌蒙國慈矜無由仰謝共慧雲洛州刺史田景車騎將軍姚元標河南太守司馬相貴參軍杜文敬等建碑前像金容後刊靈讚庶以茲善崇增川岳願七廟神域皇祚遐隆群寮忠貞曠劫師僧七世父母法界含識同霑斯慶龍華之登初會其詞曰三有深无限彼岸甚悠悠於中常淪沒何年見春秋唯力王水上乘輕舟汎汎隨波轉載沈復載浮意欲渡斯盡正恨緣廢休願是者應當速返流行藏業不許樹靜風豈聽如船墮迴復無由得自亭迺一散誰當可盡生不如奮雲翼高翔天中城武定三年歲在乙丑丁丑朔十五日建之二碑側洛州沙門都定國寺主慧珍撫軍將軍大夫封緒永安公開府軍前并州主簿溫蠻大行臺郎中楊士階冠軍將軍中散大夫前康城令王孝穎主道中堅將軍長洛州別駕閿憘男祁標厲威將軍儀府集曹參軍張顯冠軍將軍儀同府中兵參軍朱子璨冠軍將軍中散大夫姚延壽前洛州沙門都阿育王寺法仙寧遠將軍前河陰令行臺郎中鄧延茂盪寇將軍馮清信士姚哲鎮遠將軍前洛州騎兵參軍黎季明前清河王司徒府參軍事裴普法師彭城王寺慧須比丘曇壽冠軍將軍中散大夫荊州別駕魯僧達中堅將軍宗山輕車將軍北荊州府主簿張顯和追聖寺法師僧遵上座道勝平遠將張暉中堅將軍車騎府司馬趙思榮洛州曹參軍紀文悅宣威將之三碑側鄉邑寺法師曇寶寺法師道顯法師道猛河南郡沙門陳留寺僧和廣陵王寺法胤報德寺道比丘道方永光寺僧賓阿育王寺主法雲景明寺法師僧晏法師比丘法仙比丘慧初平等寺僧岳法師永光寺主僧朗皇姨寺禪師法僑比丘曇比丘法亮報德寺道琳比丘僧霸上坐僧緒律師廣陵王寺主法矯報德寺僧明比丘百官丘曇玉比丘慧練比丘慧玉上坐曇仙洛州沙門統報德寺主法相彭城寺法師道原婁司徒寺主造寺曇紹比丘道珍比丘曇
